<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Central Dashboard ­— Login</title>

  <!-- ───────── BRAND COLORS (edit only these) ────────── -->
  <style>
  :root{
    --accent: #1dc25c;     /* bright green borders & lines  */
    --accent-soft:#d4af37; /* gold buttons / emphasis text */
    --text:  #ffffff;
    --bg:    #000000;
  }
  </style>

  <!-- ───────── LAYOUT & ELEMENT STYLES ────────── -->
  <style>
    *{box-sizing:border-box;margin:0;padding:0;font-family:system-ui,Segoe UI,Arial,sans-serif}
    body{background:var(--bg);color:var(--text);display:flex;min-height:100vh}
    .wrapper{margin:auto;display:flex;flex-wrap:wrap;max-width:920px;border:3px solid var(--accent)}
    .left,.right{flex:1 1 300px;padding:2.5rem}
    .left{border-right:3px solid var(--accent)}
    h1{font-size:clamp(2rem,5vw,2.8rem);margin-bottom:.75rem}
    h2{font-size:1.1rem;font-weight:400;color:var(--accent-soft);margin-bottom:2rem;text-transform:uppercase}
    label{display:block;font-size:.9rem;margin:.85rem 0 .35rem}
    input{width:100%;padding:.8rem 1rem;border:2px solid var(--accent);background:transparent;color:var(--text);border-radius:.35rem}
    button{margin-top:2rem;width:100%;padding:.9rem;border:none;border-radius:2rem;background:var(--accent-soft);color:var(--bg);font-weight:600;font-size:1.05rem;cursor:pointer}
    a{color:var(--accent-soft);font-size:.85rem;text-decoration:none}
    a:hover{text-decoration:underline}
    /*  mobile  */
    @media(max-width:680px){.left{border-right:none;border-bottom:3px solid var(--accent)}}
  </style>
</head>
<body>

  <main class="wrapper">
    <!-- ––––––––––– LEFT COLUMN ––––––––––– -->
    <section class="left">
        <h1>Central Dashboard</h1>
        <h2>Secure Login</h2>

        <form>
          <label for="email">Email</label>
          <input id="email" type="email" placeholder="name@titancoreholdings.com" required>

          <label for="pw">Password</label>
          <input id="pw" type="password" placeholder="Password" required>

          <button type="submit">Login</button>
        </form>

        <p style="margin-top:1rem">
          <a href="#">Forgot password?</a> ·
          <a href="#">Forgot email?</a>
        </p>
    </section>

    <!-- ––––––––––– RIGHT COLUMN ––––––––––– -->
    <aside class="right">
        <h1 style="font-size:2.25rem;margin-bottom:1.2rem">Titan Core Holdings</h1>
        <p style="line-height:1.55">
          Multi-company command center providing cross-entity finance, tax &
          operations oversight.<br><br>
          Access is restricted to authorized Titan Core executives and
          system administrators.
        </p>
    </aside>
  </main>

</body>
</html>
