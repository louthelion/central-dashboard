<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Central Dashboard Login</title>
  <style>
    :root{
      --bg:#000000;
      --panel:#070707;
      --green:#18c25c;
      --gold:#d4af37;
      --white:#ffffff;
      --muted:#bdbdbd;
    }

    *{
      box-sizing:border-box;
      margin:0;
      padding:0;
      font-family:Arial, Helvetica, sans-serif;
    }

    body{
      background:var(--bg);
      color:var(--white);
      min-height:100vh;
      padding:18px 12px;
    }

    .page-title{
      width:min(1200px, 98%);
      margin:0 auto 16px;
      font-size:clamp(2rem, 4vw, 3.4rem);
      font-weight:800;
      color:var(--green);
      text-align:left;
    }

    .wrap{
      width:min(1200px, 98%);
      margin:0 auto;
      border:2px solid var(--green);
      background:var(--panel);
      display:grid;
      grid-template-columns:46% 54%;
      min-height:560px;
      border-radius:18px;
      overflow:hidden;
    }

    .left{
      padding:28px 22px 24px;
      display:flex;
      flex-direction:column;
      justify-content:center;
    }

    .login-title{
      font-size:clamp(1.8rem, 3vw, 2.6rem);
      font-weight:800;
      color:var(--gold);
      margin-bottom:22px;
    }

    .field{
      margin-bottom:18px;
    }

    .field label{
      display:block;
      font-size:1rem;
      font-weight:700;
      margin-bottom:8px;
      color:var(--white);
    }

    .field input{
      width:100%;
      padding:15px 14px;
      border:2px solid var(--green);
      border-radius:16px;
      background:#000;
      color:#fff;
      font-size:1rem;
      outline:none;
    }

    .field input::placeholder{
      color:#777777;
    }

    .field input:focus{
      border-color:var(--gold);
    }

    .login-btn{
      width:100%;
      margin-top:8px;
      padding:16px 14px;
      border:none;
      border-radius:40px;
      background:var(--gold);
      color:#000;
      font-size:1.05rem;
      font-weight:800;
      cursor:pointer;
    }

    .login-btn:hover{
      background:var(--green);
      color:#000;
    }

    .helper{
      margin-top:18px;
      display:flex;
      flex-wrap:wrap;
      gap:8px;
      font-size:.96rem;
      line-height:1.4;
    }

    .helper a{
      color:var(--gold);
      text-decoration:none;
    }

    .helper a:hover{
      text-decoration:underline;
    }

    .status{
      min-height:22px;
      margin-top:10px;
      color:var(--green);
      font-size:.92rem;
    }

    .right{
      padding:28px 24px 24px;
      display:flex;
      align-items:center;
    }

    .desc{
      max-width:100%;
      font-size:1.04rem;
      line-height:1.75;
      color:var(--white);
    }

    .desc .note{
      display:block;
      margin-top:20px;
      color:var(--muted);
      font-size:.96rem;
      line-height:1.5;
    }

    @media (max-width:700px){
      .wrap{
        grid-template-columns:1fr;
      }

      .left{
        padding-bottom:10px;
      }

      .right{
        padding-top:8px;
      }
    }
  </style>
</head>
<body>
  <div class="page-title">Central Dashboard</div>

  <div class="wrap">
    <div class="left">
      <div class="login-title">Login</div>

      <form id="loginForm">
        <div class="field">
          <label for="email">Email</label>
          <input id="email" type="email" placeholder="name@titancoreholdings.com" required>
        </div>

        <div class="field">
          <label for="password">Password</label>
          <input id="password" type="password" placeholder="Password" required>
        </div>

        <button type="submit" class="login-btn">Login</button>

        <div class="helper">
          <a href="https://passwordreset.microsoftonline.com/" target="_blank" rel="noopener">Forgot password?</a>
          <span>•</span>
          <a href="mailto:helpdesk@titancoreholdings.com?subject=Need%20help%20with%20dashboard%20email">Forgot email?</a>
        </div>

        <div class="status" id="status"></div>
      </form>
    </div>

    <div class="right">
      <div class="desc">
        Multi-company command center for reporting, oversight, tax review,
        operational review, finance visibility, and executive access across
        the full TitanCore network.

        <span class="note">
          Sign in to continue to the Central Dashboard.
        </span>
      </div>
    </div>
  </div>

  <script>
    document.getElementById("loginForm").addEventListener("submit", function(e){
      e.preventDefault();

      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value.trim();
      const status = document.getElementById("status");

      if(!email || !password){
        status.textContent = "Enter your email and password.";
        return;
      }

      status.textContent = "Opening dashboard...";

      setTimeout(function(){
        window.location.href = "index.html";
      }, 300);
    });
  </script>
</body>
</html>
